spring.application.name=widget

# H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:widget
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Lenient JSON parsing for Shopify response (which has many fields we ignore)
spring.jackson.deserialization.fail-on-unknown-properties=false

# Shopify ingest source. Replace with your store domain (e.g. https://shop.example.com).
shopify.store-url=https://kith.com

# LLM: "mock" (default, templated string) or "claude" (real Anthropic call).
app.llm.provider=mock
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-haiku-4-5
